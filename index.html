<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Property Cleaning Survey</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Property Cleaning Survey</h2>

<form id="surveyForm">

  <!-- CONTACT DETAILS -->
  <div class="form-group">
    <label>1. Name</label>
    <input type="text" id="name" required>
  </div>

  <div class="form-group">
    <label>2. Email</label>
    <input type="email" id="email" required>
  </div>

  <div class="form-group">
    <label>3. Phone</label>
    <input type="text" id="phone" required>
  </div>

  <div class="form-group">
    <label>4. Address</label>
    <input type="text" id="address" required>
  </div>

  <!-- PROPERTY TYPE -->
  <div class="form-group">
    <label>5. What type of property needs cleaning?</label>
    <select id="propertyType">
      <option>Terraced</option>
      <option>Semi-detached</option>
      <option>Detached</option>
    </select>
  </div>

  <!-- WINDOW COUNT -->
  <div class="form-group">
    <label>6. How many windows are there?</label>
    <input type="number" id="windowCount">
  </div>

  <!-- WINDOW TYPE -->
  <div class="form-group">
    <label>7. What type of windows are they?</label>
    <select id="windowType">
      <option>Small panes</option>
      <option>Medium panes</option>
      <option>Large panes</option>
    </select>
  </div>

  <!-- STOREYS -->
  <div class="form-group">
    <label>8. How many storeys?</label>
    <select id="storeys">
      <option>1 (Ground floor)</option>
      <option>2 (Ground + First)</option>
      <option>3+</option>
    </select>
  </div>

  <!-- ROOF WINDOWS -->
  <div class="form-group">
    <label>9. Are there any roof windows?</label>
    <select id="roofWindows">
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

  <!-- EXTRA GLASS -->
  <div class="form-group">
    <label>10. Is there any other glass (e.g. balcony)?</label>
    <select id="extraGlass">
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

  <!-- ACCESS -->
  <div class="form-group">
    <label>11. Are all windows easy to access?</label>
    <select id="access">
      <option>Yes</option>
      <option>No (ladder/scaffold required)</option>
    </select>
  </div>

  <!-- CLEANING TYPE -->
  <div class="form-group">
    <label>12. What needs cleaning this time?</label>
    <select id="cleaningType">
      <option>Outside windows</option>
      <option>Outside windows and glass doors</option>
      <option>Inside and outside of windows</option>
      <option>Inside and outside of windows and glass doors</option>
    </select>
  </div>

  <!-- EXTRAS -->
  <div class="form-group">
    <label>13. Are there any extras to include?</label>
    <select id="extras">
      <option>No extras</option>
      <option>Window frames</option>
      <option>Sills</option>
      <option>Fascias</option>
      <option>Soffits</option>
      <option>Non-glass doors</option>
      <option>Conservatory / skylights / balcony</option>
      <option>Extra frame work</option>
    </select>
  </div>

  <!-- LAST CLEANED -->
  <div class="form-group">
    <label>14. When was your property last cleaned?</label>
    <select id="lastCleaned">
      <option>Less than 6 months</option>
      <option>6–12 months</option>
      <option>Over 12 months</option>
    </select>
  </div>

  <!-- FREQUENCY -->
  <div class="form-group">
    <label>15. How often would you like the clean?</label>
    <select id="frequency">
      <option>One-off clean</option>
      <option>Every 4 weeks</option>
      <option>Every 6 weeks</option>
      <option>Every 8 weeks</option>
      <option>Every 12 weeks</option>
    </select>
  </div>

  <button type="submit">Submit Survey</button>

</form>

<script>
document.getElementById("surveyForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,

    propertyType: document.getElementById("propertyType").value,
    windowCount: document.getElementById("windowCount").value,
    windowType: document.getElementById("windowType").value,
    storeys: document.getElementById("storeys").value,
    roofWindows: document.getElementById("roofWindows").value,
    extraGlass: document.getElementById("extraGlass").value,
    access: document.getElementById("access").value,
    cleaningType: document.getElementById("cleaningType").value,
    extras: document.getElementById("extras").value,
    lastCleaned: document.getElementById("lastCleaned").value,
    frequency: document.getElementById("frequency").value
  };

  fetch("YOUR_WEB_APP_URL_HERE", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("Survey submitted successfully!");
    document.getElementById("surveyForm").reset();
  })
  .catch(err => {
    alert("Error submitting form");
    console.error(err);
  });
});
</script>

</body>
</html>
