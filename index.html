<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Property Cleaning Survey</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    select, input {
      width: 100%;
      padding: 8px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Property Cleaning Survey</h2>

<form id="surveyForm">

  <div class="form-group">
    <label>5. Property Type</label>
    <select id="propertyType">
      <option>Terraced</option>
      <option>Semi-detached</option>
      <option>Detached</option>
    </select>
  </div>

  <div class="form-group">
    <label>6. Window Count</label>
    <input type="number" id="windowCount">
  </div>

  <div class="form-group">
    <label>Window Type</label>
    <select id="windowType">
      <option>Small panes</option>
      <option>Medium panes</option>
      <option>Large panes</option>
    </select>
  </div>

  <div class="form-group">
    <label>Storeys</label>
    <select id="storeys">
      <option>1</option>
      <option>2</option>
      <option>3+</option>
    </select>
  </div>

  <div class="form-group">
    <label>Roof Windows?</label>
    <select id="roofWindows">
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

  <div class="form-group">
    <label>Extra Glass?</label>
    <select id="extraGlass">
      <option>Yes</option>
      <option>No</option>
    </select>
  </div>

  <div class="form-group">
    <label>Access</label>
    <select id="access">
      <option>Easy access</option>
      <option>Ladder/scaffold required</option>
    </select>
  </div>

  <div class="form-group">
    <label>7. Cleaning Type</label>
    <select id="cleaningType">
      <option>Outside windows</option>
      <option>Inside & outside windows</option>
      <option>Windows + glass doors</option>
      <option>Full clean (all)</option>
    </select>
  </div>

  <div class="form-group">
    <label>8. Extras</label>
    <select id="extras">
      <option>No extras</option>
      <option>Frames</option>
      <option>Sills</option>
      <option>Fascias & soffits</option>
      <option>Conservatory / skylights</option>
    </select>
  </div>

  <div class="form-group">
    <label>9. Last Cleaned</label>
    <select id="lastCleaned">
      <option>&lt; 6 months</option>
      <option>6–12 months</option>
      <option>12+ months</option>
    </select>
  </div>

  <div class="form-group">
    <label>10. Frequency</label>
    <select id="frequency">
      <option>One-off</option>
      <option>Every 4 weeks</option>
      <option>Every 6 weeks</option>
      <option>Every 8 weeks</option>
      <option>Every 12 weeks</option>
    </select>
  </div>

  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("surveyForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    propertyType: document.getElementById("propertyType").value,
    windowCount: document.getElementById("windowCount").value,
    windowType: document.getElementById("windowType").value,
    storeys: document.getElementById("storeys").value,
    roofWindows: document.getElementById("roofWindows").value,
    extraGlass: document.getElementById("extraGlass").value,
    access: document.getElementById("access").value,
    cleaningType: document.getElementById("cleaningType").value,
    extras: document.getElementById("extras").value,
    lastCleaned: document.getElementById("lastCleaned").value,
    frequency: document.getElementById("frequency").value
  };

  fetch("https://script.google.com/u/0/home/projects/1r5Qb2KkDkItSsoqCz358Nb3GC5QraAG7VSP7pYuS4zTABXIgeADXUQrZ/edit", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("Form submitted successfully!");
    document.getElementById("surveyForm").reset();
  })
  .catch(err => {
    alert("Error submitting form");
    console.error(err);
  });
});
</script>

</body>
</html>
