<!DOCTYPE html>
<html>
<head>
  <title>Property Cleaning Survey</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; }
    label { display: block; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Customer Info</h2>
<div class="section">
  <label>Name:</label>
  <input type="text" id="name" required>

  <label>Mobile / Telephone / Email:</label>
  <input type="text" id="contact" required>

  <label>Address / What3Words:</label>
  <input type="text" id="address" required>
</div>

<h2>Your Property</h2>
<div class="section">

  <label>5. Property Type</label>
  <select id="propertyType">
    <option>Terraced</option>
    <option>Semi-detached</option>
    <option>Detached</option>
  </select>

  <label>6. Number of windows</label>
  <input type="number" id="windows">

  <label>Window size/type</label>
  <select id="windowType">
    <option>Small panes</option>
    <option>Medium panes</option>
    <option>Large panes</option>
  </select>

  <label>Storeys</label>
  <input type="text" id="storeys">

  <label>Roof windows?</label>
  <select id="roofWindows">
    <option>Yes</option>
    <option>No</option>
  </select>

  <label>Other glass (balcony etc)?</label>
  <input type="text" id="otherGlass">

  <label>Access difficulty</label>
  <select id="access">
    <option>Easy access</option>
    <option>Ladders required</option>
    <option>Scaffold required</option>
  </select>

  <label>7. What needs cleaning?</label>
  <select id="cleaningType">
    <option>Outside windows</option>
    <option>Outside windows and glass doors</option>
    <option>Inside and outside of windows</option>
    <option>Inside and outside of windows and glass doors</option>
  </select>

  <label>8. Extras</label>
  <select id="extras">
    <option>None</option>
    <option>Window frames</option>
    <option>Sills</option>
    <option>Fascias</option>
    <option>Soffits</option>
    <option>Non-glass doors</option>
    <option>One extra area (small conservatory/skylights/balcony panels)</option>
    <option>Large conservatory / multiple skylights / large balcony panels</option>
    <option>Extra work on frames</option>
  </select>

  <label>9. Last cleaned</label>
  <input type="date" id="lastCleaned">

  <label>10. Frequency</label>
  <select id="frequency">
    <option>Intensive one-off clean</option>
    <option>One-off clean</option>
    <option>Regular every 4 weeks</option>
    <option>Regular every 6 weeks</option>
    <option>Regular every 8 weeks</option>
    <option>Regular every 12 weeks</option>
  </select>

</div>

<button onclick="submitForm()">Submit</button>

<script>
function submitForm() {
  const data = {
    name: document.getElementById("name").value,
    contact: document.getElementById("contact").value,
    address: document.getElementById("address").value,
    propertyType: document.getElementById("propertyType").value,
    windows: document.getElementById("windows").value,
    windowType: document.getElementById("windowType").value,
    storeys: document.getElementById("storeys").value,
    roofWindows: document.getElementById("roofWindows").value,
    otherGlass: document.getElementById("otherGlass").value,
    access: document.getElementById("access").value,
    cleaningType: document.getElementById("cleaningType").value,
    extras: document.getElementById("extras").value,
    lastCleaned: document.getElementById("lastCleaned").value,
    frequency: document.getElementById("frequency").value
  };

  fetch("https://script.google.com/macros/s/AKfycbwCd8Wws-wEa6wuLR9RQ82mYXVeWr_MsyIymU1nMUEfQiXSGKSnVJLyUGNS3RU_xaWneg/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Submitted successfully!");
}
</script>

</body>
</html>
