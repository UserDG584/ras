<!DOCTYPE html>
<html>
<head>
  <title>Customer Cleaning Survey</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin: 6px 0 15px 0;
    }
    button {
      padding: 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Cleaning Survey Form</h1>

<form id="surveyForm">

<h2>Your Details</h2>

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone" required>
<input id="email" placeholder="Email" required>
<textarea id="location" placeholder="Full Address + Postcode" required></textarea>

<h2>Property</h2>

<select id="propertyType" required>
  <option>Terraced</option>
  <option>Semi-detached</option>
  <option>Detached</option>
</select>

<input id="windows" placeholder="Number of Windows" required>
<input id="windowType" placeholder="Window Type" required>
<input id="storeys" placeholder="Floors" required>

<select id="roofWindows">
  <option>No</option>
  <option>Yes</option>
</select>

<textarea id="otherGlass" placeholder="Other Glass"></textarea>

<select id="access">
  <option>Yes</option>
  <option>No</option>
</select>

<h2>Cleaning Type</h2>
<select id="cleaningType">
  <option>Outside windows</option>
  <option>Outside windows and glass doors</option>
  <option>Inside and outside windows</option>
  <option>Inside and outside windows + glass doors</option>
</select>

<h2>Extras</h2>
<select id="extras">
  <option>No extras</option>
  <option>One extra area</option>
  <option>Multiple skylights / balcony panels</option>
</select>

<h2>Last Cleaned</h2>
<textarea id="lastCleaned"></textarea>

<h2>Frequency</h2>
<select id="frequency">
  <option>12+ months</option>
  <option>6–12 months</option>
  <option>4 weeks</option>
  <option>6 weeks</option>
  <option>8 weeks</option>
  <option>12 weeks</option>
</select>

<button type="submit">Submit</button>

</form>

<script>
const endpoint = "https://script.google.com/macros/s/AKfycbwoNXyGFpG97MgdypxUON4UBeqejIJkEnmH_87pXOhBoBIt87C-9gzGyc69ouz9wBg6lg/exec";

document.getElementById("surveyForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    location: document.getElementById("location").value,
    propertyType: document.getElementById("propertyType").value,
    windows: document.getElementById("windows").value,
    windowType: document.getElementById("windowType").value,
    storeys: document.getElementById("storeys").value,
    roofWindows: document.getElementById("roofWindows").value,
    otherGlass: document.getElementById("otherGlass").value,
    access: document.getElementById("access").value,
    cleaningType: document.getElementById("cleaningType").value,
    extras: document.getElementById("extras").value,
    lastCleaned: document.getElementById("lastCleaned").value,
    frequency: document.getElementById("frequency").value
  };

  const res = await fetch(endpoint, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.status === "success") {
    window.location.href = "thankyou.html";
  } else {
    alert("Submission failed");
  }
});
</script>

</body>
</html>
