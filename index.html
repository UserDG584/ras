<!DOCTYPE html>
<html>
<head>
  <title>Cleaning Survey Form</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      max-width: 650px;
    }

    h1, h2 {
      margin-top: 25px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px;
      box-sizing: border-box;
    }

    label {
      font-weight: bold;
    }

    .checkbox-group label {
      display: block;
      font-weight: normal;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      background: green;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Cleaning Survey Form</h1>

<form id="surveyForm">

<!-- DETAILS -->
<h2>Your Details</h2>

<label>Full Name *</label>
<input id="name" required>

<label>Phone Number *</label>
<input id="phone" required>

<label>Email *</label>
<input id="email" type="email" required>

<label>Address *</label>
<textarea id="location" required></textarea>

<!-- PROPERTY -->
<h2>Your Property</h2>

<label>Property Type *</label>
<select id="propertyType">
  <option>Terraced</option>
  <option>Semi-detached</option>
  <option>Detached</option>
</select>

<label>Number of Windows *</label>
<input id="windows" type="number">

<label>Window Pane Type *</label>
<select id="windowType">
  <option>Small</option>
  <option>Medium</option>
  <option>Large</option>
</select>

<label>Floors *</label>
<input id="storeys">

<label>Roof Windows</label>
<select id="roofWindows">
  <option>No</option>
  <option>Yes</option>
</select>

<label>Other Glass</label>
<textarea id="otherGlass"></textarea>

<label>Easy Access?</label>
<select id="access">
  <option>Yes</option>
  <option>No</option>
</select>

<!-- CLEANING -->
<h2>Your Cleaning Type</h2>

<select id="cleaningType">
  <option>Outside windows</option>
  <option>Outside windows and glass doors</option>
  <option>Inside and outside windows</option>
  <option>Inside and outside windows + glass doors</option>
</select>

<!-- EXTRAS -->
<h2>Extras</h2>

<div class="checkbox-group">
  <label><input type="checkbox" name="extras" value="Soffits"> Soffits</label>
  <label><input type="checkbox" name="extras" value="Facias"> Facias</label>
  <label><input type="checkbox" name="extras" value="Gutters"> Gutters</label>
  <label><input type="checkbox" name="extras" value="Solar Panels"> Solar Panels</label>
  <label><input type="checkbox" name="extras" value="None"> None</label>
</div>

<!-- PREVIOUS CLEAN -->
<h2>When was your property last cleaned?</h2>
<textarea id="lastCleaned"></textarea>

<!-- FREQUENCY -->
<h2>Frequency</h2>

<select id="frequency">
  <option>Every 4 weeks</option>
  <option>Every 6 weeks</option>
  <option>Every 8 weeks</option>
  <option>Every 12 weeks</option>
</select>

<button type="submit">Submit</button>

</form>

<!-- SCRIPT -->
<script>
const endpoint = "https://script.google.com/macros/s/AKfycbxKQIBlwnieqkoqFRWBEYGRD8Afu08soCiz28Jed2P4SOP24oCWw1Ot1zq3FhMsmTHxIA/exec";

document.getElementById("surveyForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const extrasChecked = [...document.querySelectorAll('input[name="extras"]:checked')]
    .map(el => el.value);

  const data = {
    name: name.value,
    phone: phone.value,
    email: email.value,
    location: location.value,
    propertyType: propertyType.value,
    windows: windows.value,
    windowType: windowType.value,
    storeys: storeys.value,
    roofWindows: roofWindows.value,
    otherGlass: otherGlass.value,
    access: access.value,
    cleaningType: cleaningType.value,
    extras: extrasChecked,
    lastCleaned: lastCleaned.value,
    frequency: frequency.value
  };

  try {
    const res = await fetch(endpoint, {
      method: "POST",
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "application/json"
      }
    });

    const result = await res.json();

    if (result.status === "success") {
      document.body.innerHTML = "<h1>Submission complete</h1>";
    } else {
      alert("Submission failed");
    }

  } catch (err) {
    alert("Error submitting form");
  }
});
</script>

</body>
</html>
