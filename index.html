<!DOCTYPE html>
<html>
<head>
  <title>Property Cleaning Survey</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; }
    label { display: block; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Customer Info</h2>
<div class="section">
  <label>Name *</label>
  <input type="text" id="name" required>

  <label>Email *</label>
  <input type="email" id="email" required>

  <label>Phone</label>
  <input type="text" id="phone">

  <label>Address / What3Words</label>
  <input type="text" id="address">
</div>

<h2>Your Property</h2>
<div class="section">

  <label>Property Type</label>
  <select id="propertyType">
    <option value="">--Select--</option>
    <option>Terraced</option>
    <option>Semi-detached</option>
    <option>Detached</option>
  </select>

  <label>Number of windows</label>
  <input type="number" id="windows">

  <label>Window type</label>
  <select id="windowType">
    <option value="">--Select--</option>
    <option>Small panes</option>
    <option>Medium panes</option>
    <option>Large panes</option>
  </select>

  <label>Storeys</label>
  <input type="text" id="storeys">

  <label>Roof windows?</label>
  <select id="roofWindows">
    <option value="">--Select--</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <label>Other glass</label>
  <input type="text" id="otherGlass">

  <label>Access</label>
  <select id="access">
    <option value="">--Select--</option>
    <option>Easy access</option>
    <option>Ladders required</option>
    <option>Scaffold required</option>
  </select>

  <label>Cleaning type</label>
  <select id="cleaningType">
    <option value="">--Select--</option>
    <option>Outside windows</option>
    <option>Outside windows and glass doors</option>
    <option>Inside and outside of windows</option>
    <option>Inside and outside of windows and glass doors</option>
  </select>

  <label>Extras</label>
  <select id="extras">
    <option value="">--Select--</option>
    <option>None</option>
    <option>Window frames</option>
    <option>Sills</option>
    <option>Fascias</option>
    <option>Soffits</option>
    <option>Non-glass doors</option>
    <option>Small conservatory / skylights / balcony</option>
    <option>Large conservatory / multiple skylights</option>
    <option>Extra frame work</option>
  </select>

  <label>Last cleaned</label>
  <input type="date" id="lastCleaned">

  <label>Frequency</label>
  <select id="frequency">
    <option value="">--Select--</option>
    <option>Intensive one-off</option>
    <option>One-off clean</option>
    <option>Every 4 weeks</option>
    <option>Every 6 weeks</option>
    <option>Every 8 weeks</option>
    <option>Every 12 weeks</option>
  </select>

</div>

<button onclick="submitForm()">Submit</button>

<script>
function valOrNA(v){ return v && v.trim() !== "" ? v : "N/A"; }

function submitForm(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!name || !email){
    alert("Name and Email are required");
    return;
  }

  const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if(!emailValid){
    alert("Enter a valid email");
    return;
  }

  const data = {
    name,
    email,
    phone: valOrNA(document.getElementById("phone").value),
    address: valOrNA(document.getElementById("address").value),
    propertyType: valOrNA(propertyType.value),
    windows: valOrNA(windows.value),
    windowType: valOrNA(windowType.value),
    storeys: valOrNA(storeys.value),
    roofWindows: valOrNA(roofWindows.value),
    otherGlass: valOrNA(otherGlass.value),
    access: valOrNA(access.value),
    cleaningType: valOrNA(cleaningType.value),
    extras: valOrNA(extras.value),
    lastCleaned: valOrNA(lastCleaned.value),
    frequency: valOrNA(frequency.value)
  };

  fetch("YOUR_DEPLOYED_SCRIPT_URL", {
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(res=>{
    if(res.status==="duplicate"){
      alert("Duplicate property submission detected.");
    } else {
      alert("Submitted successfully!");
    }
  })
  .catch(()=>alert("Error submitting"));
}
</script>

</body>
</html>
