<!DOCTYPE html>
<html>
<head>
  <title>Window Cleaning Survey</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; }
    label { display:block; margin-top:10px; font-weight:bold; }
    input, select { width:100%; padding:8px; margin-top:5px; }
    .row { margin-bottom:15px; }
  </style>
</head>
<body>

<h2>Window Cleaning Survey</h2>

<form id="surveyForm">

<h3>Your Details</h3>

<label>Name</label>
<input name="name" required>

<label>Telephone number</label>
<input name="phone" required>

<label>Email Address</label>
<input name="email" required>

<label>Full Address</label>
<input name="address" required>

<h3>Your Property</h3>

<label>Property Type</label>
<select name="style">
  <option value="Semi">Semi-detached</option>
  <option value="Detached">Detached</option>
  <option value="Tera">Terraced</option>
  <option value="Other">Other</option>
</select>

<label>Number of Windows</label>
<input type="number" name="windows">

<label>Window Size</label>
<select name="size">
  <option value="Sml">Small</option>
  <option value="Medium">Medium</option>
  <option value="LRGE">Large</option>
</select>

<label>Clean Type</label>
<select name="cleanType">
  <option value="Ext">Outside windows</option>
  <option value="Ext + Doors">Outside windows and glass doors</option>
  <option value="Int + Ext">Inside and outside</option>
  <option value="All">Inside + outside + doors</option>
</select>

<label>Floors</label>
<input type="number" name="floors">

<label>Roof Windows</label>
<select name="roof">
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Other Glass?</label>
<select name="otherGlass" id="otherGlass">
  <option value="No">No</option>
  <option value="Yes">Yes</option>
</select>

<input type="text" name="otherGlassDesc" placeholder="Describe other glass (if yes)">

<label>Access</label>
<select name="access">
  <option value="Yes">Easy access</option>
  <option value="Ladder/Scaff">Needs ladder/scaffold</option>
</select>

<label>Extras</label><br>
<input type="checkbox" name="extras" value="None"> None<br>
<input type="checkbox" name="extras" value="F"> Facias<br>
<input type="checkbox" name="extras" value="S"> Soffits<br>
<input type="checkbox" name="extras" value="xSML"> Small extra area<br>
<input type="checkbox" name="extras" value="xM/L"> Medium/Large extra<br>

<label>Last Cleaned</label>
<input type="date" name="prev">

<label>Frequency</label>
<select name="frequency">
  <option value="+12mnths">12+ months</option>
  <option value="6-12mnths">6-12 months</option>
  <option value="4 weeks">4 weeks</option>
  <option value="6 weeks">6 weeks</option>
  <option value="8 weeks">8 weeks</option>
  <option value="12 weeks">12 weeks</option>
</select>

<br><br>
<button type="submit">Submit</button>

</form>

<script>
document.getElementById("surveyForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const form = new FormData(this);

  const extras = Array.from(document.querySelectorAll('input[name="extras"]:checked'))
    .map(x => x.value);

  const data = {
    name: form.get("name"),
    phone: form.get("phone"),
    email: form.get("email"),
    address: form.get("address"),
    style: form.get("style"),
    windows: form.get("windows"),
    size: form.get("size"),
    cleanType: form.get("cleanType"),
    floors: form.get("floors"),
    roof: form.get("roof"),
    otherGlass: form.get("otherGlass"),
    otherGlassDesc: form.get("otherGlassDesc"),
    access: form.get("access"),
    extras: extras,
    prev: form.get("prev"),
    frequency: form.get("frequency")
  };

  await fetch(https://script.google.com/macros/s/AKfycbwrJqFYpCcuBYDIWhHl2gxnkgGSU7mrhNqVVbvg42tALGSWPn7L_Z5M7wzuBEkaYUpG3g/exec, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Submitted successfully!");
});
</script>

</body>
</html>
