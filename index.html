<!DOCTYPE html>
<html>
<head>
  <title>Customer Cleaning Survey</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    h2 { margin-top: 30px; }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px 0;
    }
    fieldset { margin-bottom: 20px; padding: 15px; }
    label { font-weight: bold; }
    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Customer Cleaning Survey Form</h1>

<form id="surveyForm">

<!-- YOUR DETAILS -->
<h2>Your Details</h2>

<label>Name *</label>
<input type="text" id="name" required>

<label>Telephone Number *</label>
<input type="tel" id="phone" required>

<label>Email Address *</label>
<input type="email" id="email" required>

<label>Location (Full Address + Postcode / What3Words) *</label>
<textarea id="location" required></textarea>

<!-- PROPERTY -->
<h2>Your Property</h2>

<label>Property Type *</label>
<select id="propertyType" required>
  <option value="">Select</option>
  <option>Terraced</option>
  <option>Semi-detached</option>
  <option>Detached</option>
</select>

<label>How many windows? *</label>
<input type="number" id="windows" required>

<label>Window type *</label>
<input type="text" id="windowType" placeholder="Small / Medium / Large panes" required>

<label>Number of storeys *</label>
<input type="text" id="storeys" required>

<label>Roof windows?</label>
<select id="roofWindows">
  <option>No</option>
  <option>Yes</option>
</select>

<label>Other glass (balcony etc)</label>
<textarea id="otherGlass"></textarea>

<label>Are all windows easy to access?</label>
<select id="access">
  <option>Yes</option>
  <option>No - ladders/scaffold required</option>
</select>

<!-- CLEANING TYPE -->
<h2>What needs cleaning?</h2>
<select id="cleaningType" required>
  <option value="">Select</option>
  <option>Outside windows</option>
  <option>Outside windows and glass doors</option>
  <option>Inside and outside windows</option>
  <option>Inside and outside windows + glass doors</option>
</select>

<!-- EXTRAS -->
<h2>Extras (select one main option)</h2>
<select id="extras">
  <option>No extras</option>
  <option>Facias</option>
  <option>Soffits</option>
  <option>Non-glass doors</option>
  <option>One extra area (conservatory / skylights / balcony panels up to 3m)</option>
  <option>Medium to large extras</option>
  <option>Multiple skylights or balcony panels over 3m</option>
</select>

<!-- LAST CLEANED -->
<h2>Last Cleaning</h2>
<textarea id="lastCleaned" placeholder="Describe when last cleaned"></textarea>

<!-- FREQUENCY -->
<h2>Cleaning Frequency</h2>
<select id="frequency">
  <option>Intensive one-off clean (12+ months)</option>
  <option>One-off clean (6–12 months)</option>
  <option>Regular every 4 weeks</option>
  <option>Regular every 6 weeks</option>
  <option>Regular every 8 weeks</option>
  <option>Regular every 12 weeks</option>
</select>

<br><br>
<button type="submit">Submit Form</button>

</form>

<script>
const endpoint = "https://script.google.com/macros/s/AKfycbwouDl6Ai9p3DHpGRGFMhuKeUrYf5YQCHcoD3B23B-2gTGKKaOMug7kECppD6w5da5PFQ/exec";

document.getElementById("surveyForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  function val(id) {
    const v = document.getElementById(id).value.trim();
    return v === "" ? "N/A" : v;
  }

  const data = {
    name: val("name"),
    phone: val("phone"),
    email: val("email"),
    location: val("location"),
    propertyType: val("propertyType"),
    windows: val("windows"),
    windowType: val("windowType"),
    storeys: val("storeys"),
    roofWindows: val("roofWindows"),
    otherGlass: val("otherGlass"),
    access: val("access"),
    cleaningType: val("cleaningType"),
    extras: val("extras"),
    lastCleaned: val("lastCleaned"),
    frequency: val("frequency")
  };

  const res = await fetch(endpoint, {
    method: "POST",
    body: JSON.stringify(data)
  });

  const result = await res.text();
  alert(result);
});
</script>

</body>
</html>
